<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
        <head>
                <meta charset = "UTF-8" />
                <meta name = "viewport" content = "width=device-width, initial-scale=1.0" />
                <title>Expenses & Budgets - Finance Manager</title>
                <script src = "https://cdn.tailwindcss.com"></script>
                <link href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel = "stylesheet" />
                <style>
                        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
                        .sticky-budget-header { position: sticky; top: 0; z-index: 40; background: rgba(248, 250, 252, 0.9); backdrop-filter: blur(8px); }
                </style>
        </head>
        <body class = "min-h-screen">

                <!-- Navigation Bar -->
                <nav class = "bg-slate-900 text-white p-4 shadow-md">
                        <div class = "max-w-7xl mx-auto flex justify-between items-center">
                                <div class = "flex gap-6">
                                        <a th:href = "@{/dashboard}" class = "hover:text-blue-400 transition-colors font-medium">Dashboard</a>
                                        <a th:href = "@{/profile/}" class = "hover:text-blue-400 transition-colors font-medium">Profile</a>
                                </div>
                                <form th:action = "@{/logout}" method = "post">
                                        <button type = "submit" class = "bg-slate-800 px-4 py-2 rounded-lg hover:bg-red-900 transition-colors text-sm">Logout</button>
                                </form>
                        </div>
                </nav>

                <!-- Sticky Budgets Section -->
                <div class = "sticky-budget-header border-b border-gray-200 py-6 px-4 mb-8">
                        <div class = "max-w-7xl mx-auto">
                                <div class = "flex items-center justify-between mb-6">
                                        <h2 class = "text-2xl font-bold text-gray-900">Active Budgets</h2>
                                        <form th:action = "@{/expenses/saveBudget}" th:object = "${budgetModel}" method = "post" class = "flex gap-2">
                                                <input type = "text" th:field = "*{category}" placeholder = "Category" class = "px-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500" required />
                                                <input type = "number" th:field = "*{limitAmount}" placeholder = "Limit" class = "px-3 py-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 w-24" required />
                                                <button type = "submit" class = "bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700 transition-all">+ Set</button>
                                        </form>
                                </div>

                                <div class = "flex flex-wrap gap-8 justify-start">
                                        <!-- Circle Budget Progress Card -->
                                        <div th:each = "budget : ${budgets}" class = "relative flex flex-col items-center group">
                                                <div class = "relative w-24 h-24">
                                                        <svg class = "w-full h-full transform -rotate-90">
                                                                <circle cx = "48" cy = "48" r = "40" stroke = "#e2e8f0" stroke-width = "8" fill = "transparent" />
                                                                <circle cx = "48" cy = "48" r = "40" stroke = "#3b82f6" stroke-width = "8" fill = "transparent" 
                                                                        stroke-dasharray = "251.2" 
                                                                        th:stroke-dashoffset = "${budget.limitAmount != 0 ? (251.2 - (251.2 * (budget.spentAmount / budget.limitAmount))) : 251.2}" />
                                                        </svg>
                                                        <div class = "absolute inset-0 flex items-center justify-center flex-col">
                                                                <span class = "text-xs font-bold text-gray-700" th:text = "${'₹' + budget.limitAmount}">₹0</span>
                                                        </div>
                                                </div>
                                                <span class = "mt-2 text-xs font-semibold text-gray-600 uppercase tracking-tight" th:text = "${budget.category}">Category</span>
                                                
                                                <!-- Delete Action Overlay -->
                                                <form th:action = "@{'/expenses/deleteBudget/' + ${budget.id}}" method = "post" class = "absolute -top-1 -right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button type = "submit" class = "bg-red-500 text-white rounded-full p-1 shadow-sm hover:bg-red-600">
                                                                <svg class = "w-3 h-3" fill = "none" stroke = "currentColor" viewBox = "0 0 24 24"><path d = "M6 18L18 6M6 6l12 12" stroke-width = "2" stroke-linecap = "round" /></svg>
                                                        </button>
                                                </form>
                                        </div>
                                </div>
                        </div>
                </div>

                <!-- Transactions Section -->
                <main class = "max-w-7xl mx-auto px-4 pb-20">
                        <div class = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div class = "p-6 border-b border-gray-50 flex justify-between items-center bg-gray-50/50">
                                        <h3 class = "text-xl font-bold text-gray-800">Monthly Transactions</h3>
                                        <button class = "text-sm font-semibold text-blue-600 hover:underline">View All History</button>
                                </div>

                                <div class = "p-6 bg-white">
                                        <form th:action = "@{/expenses/saveTransaction}" th:object = "${transactionModel}" method = "post" class = "grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                                                <input type = "text" th:field = "*{category}" placeholder = "Category (e.g. Food)" class = "px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required />
                                                <input type = "number" th:field = "*{amount}" placeholder = "Amount" class = "px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500" required />
                                                <select th:field = "*{type}" class = "px-4 py-2 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                                                        <option value = "EXPENSE">Expense</option>
                                                        <option value = "INCOME">Income</option>
                                                </select>
                                                <button type = "submit" class = "bg-gray-900 text-white py-2 rounded-xl font-bold hover:bg-black transition-colors">Add Transaction</button>
                                        </form>

                                        <div class = "overflow-x-auto">
                                                <table class = "w-full text-left border-collapse">
                                                        <thead>
                                                                <tr class = "text-gray-400 text-xs uppercase tracking-widest border-b border-gray-100">
                                                                        <th class = "pb-4 font-semibold">Category</th>
                                                                        <th class = "pb-4 font-semibold">Type</th>
                                                                        <th class = "pb-4 font-semibold">Amount</th>
                                                                        <th class = "pb-4 font-semibold">Date</th>
                                                                        <th class = "pb-4 font-semibold">Action</th>
                                                                </tr>
                                                        </thead>
                                                        <tbody class = "divide-y divide-gray-50">
                                                                <tr th:if = "${#lists.isEmpty(transactions)}">
                                                                        <td colspan = "5" class = "py-10 text-center text-gray-500">No transactions found for this month.</td>
                                                                </tr>
                                                                <tr th:each = "tx : ${transactions}" class = "group hover:bg-gray-50/50 transition-colors">
                                                                        <td class = "py-4">
                                                                                <span class = "font-medium text-gray-900" th:text = "${tx.category}">Food</span>
                                                                        </td>
                                                                        <td class = "py-4">
                                                                                <span th:class = "${tx.type.name() == 'INCOME' ? 'text-green-600' : 'text-red-500'} + ' text-xs font-bold'" th:text = "${tx.type}">EXPENSE</span>
                                                                        </td>
                                                                        <td class = "py-4 font-semibold text-gray-900" th:text = "${(tx.type.name() == 'INCOME' ? '+ ₹' : '- ₹') + tx.amount}">₹0.00</td>
                                                                        <td class = "py-4 text-gray-500 text-sm" th:text = "${#temporals.format(tx.localDateTime, 'dd MMM yyyy')}">01 May 2026</td>
                                                                        <td class = "py-4">
                                                                                <form th:action = "@{'/expenses/deleteTransaction/' + ${tx.id}}" method = "post">
                                                                                        <button type = "submit" class = "text-red-400 hover:text-red-600 transition-colors">
                                                                                                <svg class = "w-5 h-5" fill = "none" stroke = "currentColor" viewBox = "0 0 24 24"><path d = "M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width = "2" stroke-linecap = "round" stroke-linejoin = "round" /></svg>
                                                                                        </button>
                                                                                </form>
                                                                        </td>
                                                                </tr>
                                                        </tbody>
                                                </table>
                                        </div>
                                </div>
                        </div>
                </main>
      </body>
</html>
