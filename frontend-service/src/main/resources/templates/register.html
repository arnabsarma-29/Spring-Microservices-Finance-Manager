<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
        <head>
                <meta charset = "UTF-8" />
                <meta name = "viewport" content = "width=device-width, initial-scale=1.0" />
                <title>Register - Finance Manager</title>
                <script src = "https://cdn.tailwindcss.com"></script>
                <link href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel = "stylesheet" />
                <style>
                        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
                </style>
        </head>
        <body class = "flex items-center justify-center min-h-screen">
                <div class = "w-full max-w-md p-8 bg-white rounded-xl shadow-sm border border-gray-200">
                        <h2 class = "text-2xl font-semibold text-gray-800 mb-6 text-center">Create Account</h2>
                        <form th:action = "@{/profile/register}" th:object = "${user}" method = "post" class = "space-y-4">
                                <div>
                                        <label class = "block text-sm font-medium text-gray-600 mb-1">Email:</label>
                                        <input type = "email" th:field = "*{email}" class = "w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required />
                                </div>
                                <div>
                                        <label class = "block text-sm font-medium text-gray-600 mb-1">Password:</label>
                                        <input type = "password" th:field = "*{password}" class = "w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" required />
                                </div>
                                <button type = "submit" class = "w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors">Register</button>
                        </form>
                        <div class = "mt-6 text-center">
                                <a th:href = "@{/login}" class = "text-sm text-blue-600 hover:underline">Back to Login</a>
                        </div>
                </div>
        </body>
</html>
