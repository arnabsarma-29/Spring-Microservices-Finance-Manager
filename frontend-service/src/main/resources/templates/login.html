<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
        <head>
                <meta charset = "UTF-8" />
                <meta name = "viewport" content = "width=device-width, initial-scale=1.0" />
                <title>Login - Finance Manager</title>
                <script src = "https://cdn.tailwindcss.com"></script>
                <link href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel = "stylesheet" />
                <style>
                        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
                </style>
        </head>
        <body class = "flex items-center justify-center min-h-screen">
                <div class = "w-full max-w-md p-8 bg-white rounded-xl shadow-sm border border-gray-200">
                        <h2 class = "text-2xl font-semibold text-gray-800 mb-2 text-center">Login</h2>
                        <p class = "text-sm text-gray-500 mb-6 text-center">Welcome back to Finance Manager</p>

                        <div th:if = "${error}" class = "mb-4 p-3 text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg text-center" th:text = "${error}"></div>

                        <form th:action = "@{/profile/login}" th:object = "${loginModel}" method = "post" class = "space-y-4">
                                <div>
                                        <label class = "block text-sm font-medium text-gray-600 mb-1">Email:</label>
                                        <input type = "email" th:field = "*{email}" class = "w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" required />
                                </div>
                                <div>
                                        <label class = "block text-sm font-medium text-gray-600 mb-1">Password:</label>
                                        <input type = "password" th:field = "*{password}" class = "w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" required />
                                </div>
                                <button type = "submit" class = "w-full py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors shadow-sm">Login</button>
                        </form>

                        <div class = "mt-6 pt-6 border-t border-gray-100 text-center">
                                <p class = "text-sm text-gray-600">
                                        Don't have an account? 
                                        <a th:href = "@{/register}" class = "font-medium text-blue-600 hover:underline">Register here</a>
                                </p>
                        </div>
                </div>
        </body>
</html>
